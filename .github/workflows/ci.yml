name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - run: bash scripts/test-redacted-event-payload
      - run: bash scripts/test-release-gates
      - run: bash scripts/scan-sensitive.sh
      - run: |
          package_list="$(mktemp "${TMPDIR:-/tmp}/animem-package-list.XXXXXX")"
          trap 'rm -f "$package_list"' EXIT
          cargo package --allow-dirty --no-verify --list >"$package_list"
          bash scripts/check-source-bundle-allowlist "$package_list"
